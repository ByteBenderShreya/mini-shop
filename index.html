<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mini Shop</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #f5f5f5; }
    
    /* Navbar */
    nav {
      background: #2563eb;
      color: white;
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    nav h1 { font-size: 1.5rem; }
    nav a { color: white; text-decoration: none; font-weight: bold; }
    
    /* Products Grid */
    .container {
      max-width: 1200px;
      margin: 2rem auto;
      padding: 0 1rem;
    }
    .products {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 1.5rem;
    }
    
    /* Product Card */
    .product-card {
      background: white;
      border-radius: 8px;
      padding: 1rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      text-align: center;
    }
    .product-card img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      border-radius: 4px;
    }
    .product-card h3 { margin: 0.5rem 0; }
    .product-card p { color: #2563eb; font-weight: bold; font-size: 1.2rem; }
    
    /* Button */
    .btn {
      background: #2563eb;
      color: white;
      border: none;
      padding: 0.7rem 1.5rem;
      border-radius: 4px;
      cursor: pointer;
      margin-top: 0.5rem;
      width: 100%;
      font-weight: bold;
    }
    .btn:hover { background: #1d4ed8; }
  </style>
</head>
<body>

  <!-- NAVBAR - Cart Count Yaha Hai -->
  <nav>
    <h1>🛍️ Mini Shop</h1>
    <a href="/cart">Cart (<span id="cart-count">0</span>)</a>
  </nav>

  <!-- PRODUCTS -->
  <div class="container">
    <div class="products">
      
      <!-- PRODUCT 1 -->
      <div class="product-card">
        <img src="https://via.placeholder.com/250x200" alt="T-Shirt">
        <h3>Cotton T-Shirt</h3>
        <p>₹599</p>
        <button class="btn" onclick="addToCart(1, 'Cotton T-Shirt', 599, 'https://via.placeholder.com/250x200')">
          Add to Cart
        </button>
      </div>

      <!-- PRODUCT 2 -->
      <div class="product-card">
        <img src="https://via.placeholder.com/250x200" alt="Jeans">
        <h3>Denim Jeans</h3>
        <p>₹899</p>
        <button class="btn" onclick="addToCart(2, 'Denim Jeans', 899, 'https://via.placeholder.com/250x200')">
          Add to Cart
        </button>
      </div>

      <!-- PRODUCT 3 -->
      <div class="product-card">
        <img src="https://via.placeholder.com/250x200" alt="Shoes">
        <h3>Running Shoes</h3>
        <p>₹799</p>
        <button class="btn" onclick="addToCart(3, 'Running Shoes', 799, 'https://via.placeholder.com/250x200')">
          Add to Cart
        </button>
      </div>

    </div>
  </div>

  <!-- SCRIPT.JS LINK - Sabse Neeche -->
  <script src="script.js"></script>
</body>
</html>
